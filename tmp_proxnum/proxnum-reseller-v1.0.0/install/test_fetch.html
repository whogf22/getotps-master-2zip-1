<!DOCTYPE html>
<html>
<head>
    <title>Test Requirements Check</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 5px; max-width: 600px; margin: 0 auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Requirements Check Test</h1>
        <div id="status" class="status info">Testing...</div>
        <div id="result"></div>
        <button onclick="testAgain()">Test Again</button>
    </div>

    <script>
        function testRequirements() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            statusDiv.className = 'status info';
            statusDiv.textContent = 'Fetching check_requirements.php...';
            resultDiv.innerHTML = '';
            
            fetch('check_requirements.php')
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response ok:', response.ok);
                    console.log('Response headers:', response.headers);
                    
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status + ' ' + response.statusText);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log('Response text:', text);
                    statusDiv.className = 'status success';
                    statusDiv.textContent = 'Success! Got response from server.';
                    
                    try {
                        const data = JSON.parse(text);
                        resultDiv.innerHTML = '<h3>Requirements:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    } catch(e) {
                        resultDiv.innerHTML = '<h3>Raw Response:</h3><pre>' + text + '</pre>';
                    }
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    statusDiv.className = 'status error';
                    statusDiv.textContent = 'Error: ' + error.message;
                    
                    resultDiv.innerHTML = '<h3>Error Details:</h3><pre>' + 
                        'Message: ' + error.message + '\n' +
                        'Stack: ' + error.stack + 
                        '</pre>';
                });
        }
        
        function testAgain() {
            testRequirements();
        }
        
        // Auto-run on load
        window.onload = testRequirements;
    </script>
</body>
</html>
